# AeroSpace tiling window manager config
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Notify sketchybar on workspace change
after-startup-command = ['exec-and-forget sketchybar']
exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# ── Gaps ─────────────────────────────────────────────────────────
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

# ── Main keybindings (alt as modifier) ───────────────────────────
[mode.main.binding]

# Focus windows
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize windows
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'

# Float
alt-shift-f = 'layout floating tiling'

# Join with (use instead of split when normalizations are enabled)
alt-v = 'join-with right'
alt-b = 'join-with down'

# Switch workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace and follow
ctrl-alt-1 = ['move-node-to-workspace 1', 'workspace 1']
ctrl-alt-2 = ['move-node-to-workspace 2', 'workspace 2']
ctrl-alt-3 = ['move-node-to-workspace 3', 'workspace 3']
ctrl-alt-4 = ['move-node-to-workspace 4', 'workspace 4']
ctrl-alt-5 = ['move-node-to-workspace 5', 'workspace 5']
ctrl-alt-6 = ['move-node-to-workspace 6', 'workspace 6']
ctrl-alt-7 = ['move-node-to-workspace 7', 'workspace 7']
ctrl-alt-8 = ['move-node-to-workspace 8', 'workspace 8']
ctrl-alt-9 = ['move-node-to-workspace 9', 'workspace 9']

# Service mode (alt-shift-semicolon to enter, esc to exit)
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# ── Float specific apps (always on top) ──────────────────────────
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'layout floating'
